[package]
name = "sherpa-onnx-sys"
version = "1.13.3"
edition = "2021"
description = "Raw FFI bindings to the sherpa-onnx C API (Hermes fork: CUDA/DirectML/CoreML archives)"
license = "Apache-2.0"
repository = "https://github.com/k2-fsa/sherpa-onnx"
build = "build.rs"
links = "sherpa-onnx"
include = ["src/**", "build.rs", "Cargo.toml", "README.md", "LICENSE*"]

[features]
default = ["static"]
static = []
shared = []
cuda = []
directml = []
coreml = []

[lib]
name = "sherpa_onnx_sys"
path = "src/lib.rs"

[build-dependencies]
bzip2 = "0.4"
tar = "0.4"
ureq = { version = "2.12", features = ["proxy-from-env"] }

[package.metadata.docs.rs]
default-features = false
features = []
