[package]
name = "sherpa-onnx"
version = "1.13.3"
edition = "2021"
description = "Safe Rust wrapper for sherpa-onnx speech recognition toolkit (Hermes fork: GPU EP features)"
license = "Apache-2.0"
repository = "https://github.com/k2-fsa/sherpa-onnx"
documentation = "https://docs.rs/sherpa-onnx"
readme = "README.md"
keywords = ["speech", "speech-to-text", "stt", "onnx", "asr"]
categories = ["api-bindings", "multimedia::audio"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[features]
default = ["static"]
static = ["sherpa-onnx-sys/static"]
shared = ["sherpa-onnx-sys/shared"]
cuda = ["shared", "sherpa-onnx-sys/cuda"]
directml = ["shared", "sherpa-onnx-sys/directml"]
coreml = ["sherpa-onnx-sys/coreml"]

[dependencies]
sherpa-onnx-sys = { path = "../sherpa-onnx-sys", version = "1.13.3", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[package.metadata.docs.rs]
default-features = false
features = []
