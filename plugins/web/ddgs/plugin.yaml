name: web-ddgs
version: 1.0.0
description: "DuckDuckGo web search via the ddgs Rust crate — no API key required."
author: NousResearch
kind: backend
provides_web_providers:
  - ddgs
implementation: rust
backend_env_var: HERMES_WEB_SEARCH_BACKEND=ddgs
notes: >
  Port of Python plugins/web/ddgs/provider.py.
  Uses the ddgs 0.1.0 Rust crate (https://crates.io/crates/ddgs).
  Activate by setting env var: HERMES_WEB_SEARCH_BACKEND=ddgs
