name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Generate parity governance artifacts
        run: |
          python3 scripts/generate-parity-matrix.py
          python3 scripts/generate-workstream-status.py
          python3 scripts/generate-test-intent-mapping.py
          python3 scripts/generate-adapter-matrix.py
          python3 scripts/validate-intentional-divergence.py --check --allow-warnings
          python3 scripts/generate-upstream-patch-queue.py --max-commits 0
          python3 scripts/generate-global-parity-proof.py --check-ci
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy Warning Gate
        run: bash scripts/clippy-warning-gate.sh --check
      - name: Placeholder gate
        run: bash scripts/check-runtime-placeholders.sh
      - name: Tests
        run: cargo test --workspace
      - name: Parity fixture tests
        run: cargo test -p hermes-parity-tests
      - name: CLI command/action parity contract
        run: cargo test -p hermes-parity-tests --test cli_command_contract
      - name: Global parity governance contract
        run: cargo test -p hermes-parity-tests --test global_parity_governance
      - name: Upstream webhook sync script lint
        run: |
          python3 -m py_compile scripts/upstream_webhook_sync.py
          python3 -m py_compile scripts/run-golden-parity-harness.py
          python3 -m py_compile scripts/release_secret_scan.py

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - x86_64-pc-windows-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Cross build hermes
        run: cross build --release --target ${{ matrix.target }} -p hermes-cli

  macos-build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build hermes
        run: cargo build --release --target ${{ matrix.target }} -p hermes-cli
