name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p hermes-cli
      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/release/hermes dist/hermes
          tar -C dist -czf hermes-linux-x86_64.tar.gz hermes
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: hermes-linux-x86_64.tar.gz

  publish-installers:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate Homebrew formula
        run: bash scripts/generate-homebrew-formula.sh "${GITHUB_REF_NAME}"
      - name: Upload helper scripts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/install.sh
            Formula/hermes.rb
