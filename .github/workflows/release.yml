name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  security-release-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Secret scan (tracked files)
        run: |
          python3 scripts/release_secret_scan.py \
            --repo-root . \
            --report .sync-reports/release-secret-scan.json
      - name: Config redaction tests (CLI)
        run: |
          cargo test -p hermes-cli secret_stdout_gate_defaults_false -- --nocapture
          cargo test -p hermes-cli secret_stdout_gate_accepts_truthy_values -- --nocapture
          cargo test -p hermes-cli mask_secret_value_hides_payload -- --nocapture
      - name: Config redaction tests (agent replay)
        run: |
          cargo test -p hermes-agent test_redact_json_value_masks_sensitive_fields -- --nocapture
          cargo test -p hermes-agent test_replay_recorder_adds_hash_chain_metadata -- --nocapture
      - name: Generate SBOM (CycloneDX)
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --workspace --format json --output-file release-sbom.cdx.json
      - name: Upload security gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-security-artifacts
          path: |
            .sync-reports/release-secret-scan.json
            release-sbom.cdx.json

  cross-build:
    needs: security-release-gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: hermes-linux-x86_64.tar.gz
            binary: hermes
          - target: aarch64-unknown-linux-gnu
            artifact: hermes-linux-aarch64.tar.gz
            binary: hermes
          - target: x86_64-unknown-linux-musl
            artifact: hermes-linux-x86_64-musl.tar.gz
            binary: hermes
          - target: x86_64-pc-windows-gnu
            artifact: hermes-windows-x86_64.zip
            binary: hermes.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }} -p hermes-cli
      - name: Package artifact (tar.gz)
        if: "!contains(matrix.artifact, '.zip')"
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          tar -C dist -czf ${{ matrix.artifact }} ${{ matrix.binary }}
      - name: Package artifact (zip)
        if: contains(matrix.artifact, '.zip')
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist && zip ../${{ matrix.artifact }} ${{ matrix.binary }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ matrix.artifact }}

  macos-build:
    needs: security-release-gate
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: hermes-macos-aarch64.tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact: hermes-macos-x86_64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p hermes-cli
      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hermes dist/
          tar -C dist -czf ${{ matrix.artifact }} hermes
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ matrix.artifact }}

  sign-and-publish:
    needs: [security-release-gate, cross-build, macos-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download release build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Download security artifacts (SBOM)
        uses: actions/download-artifact@v4
        with:
          name: release-security-artifacts
          path: dist/security
      - name: Generate Homebrew formula
        run: bash scripts/generate-homebrew-formula.sh "${GITHUB_REF_NAME}"
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign release artifacts (keyless)
        run: |
          shopt -s nullglob
          for artifact in dist/*.tar.gz dist/*.zip; do
            cosign sign-blob \
              --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "${artifact}"
          done
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.tar.gz.sig
            dist/*.zip.sig
            dist/*.tar.gz.pem
            dist/*.zip.pem
            dist/security/release-sbom.cdx.json
            scripts/install.sh
            Formula/hermes.rb
