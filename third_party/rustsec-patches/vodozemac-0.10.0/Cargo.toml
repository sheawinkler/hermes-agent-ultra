[package]
edition = "2024"
rust-version = "1.85"
name = "vodozemac"
version = "0.10.0"
authors = [
    "Damir Jelić <poljar@termina.org.uk>",
    "Denis Kasak <dkasak@termina.org.uk>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A Rust implementation of Olm and Megolm"
readme = "README.md"
keywords = [
    "matrix",
    "chat",
    "messaging",
    "olm",
    "cryptography",
]
license = "Apache-2.0"
repository = "https://github.com/matrix-org/vodozemac"

[package.metadata.docs.rs]
