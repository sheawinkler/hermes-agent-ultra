  - grep
  - web_search
  - web_fetch
budget:
  max_result_size_chars: 100000
  max_aggregate_chars: 1000000
platforms:
  wecom:
    enabled: true
    unauthorized_dm_behavior: ignore
    group_sessions_per_user: false
    allowed_users: []
    admin_users: []
    extra:
      allow_from:
        - '*'
      bot_id: aibHDYBhMxONDWaexjD8_E_xDUzTszWQPUg
      corp_id: ww2d3fc241767f40fd
      dm_policy: open
      group_allow_from: []
