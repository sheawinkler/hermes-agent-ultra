# ============================================================
# hermes-talk Windows / 桌面版（sherpa-onnx SenseVoice + Kokoro / ZipVoice）
# 用于 make package-talk-* / release-talk；`hermes talk init` 亦使用此模板。
#
# 切换 TTS 引擎：改 [tts].engine = "kokoro" | "zipvoice"
# 切换云端 ASR/TTS：改 [asr]/[tts] backend = "bailian" 并填写 [dashscope]。
#
# sherpa-onnx 使用 CPU 执行提供者（所有平台）：
#   [sherpa] provider = "cpu"
# ============================================================

[sherpa]
provider = "cpu"

# ============================================================
# 语音识别 (ASR)
# backend: sherpa | bailian | cloud | dashscope
# ============================================================
[asr]
backend = "sherpa"
sample_rate = 16000
chunk_ms = 100
format = "pcm"
# model = "fun-asr-realtime"              # 云端 ASR 模型（backend = bailian 时使用）
# language_hints = ["zh", "en", "ja", "yue", "ko"]

[asr.sherpa]
model = "models/sensevoice/model.int8.onnx"
tokens = "models/sensevoice/tokens.txt"
language = "auto"
use_itn = true
num_threads = 4
provider = "cpu"

# ============================================================
# 语音合成 (TTS)
# backend: sherpa | bailian | cloud | dashscope
# ============================================================
[tts]
backend = "sherpa"
engine = "kokoro"
sample_rate = 24000
format = "pcm"

[tts.sherpa]
num_threads = 4
provider = "cpu"

[tts.sherpa.kokoro]
model = "models/kokoro/model.onnx"
voices = "models/kokoro/voices.bin"
tokens = "models/kokoro/tokens.txt"
data_dir = "models/kokoro/espeak-ng-data"
dict_dir = "models/kokoro/dict"
lexicon = "models/kokoro/lexicon-us-en.txt,models/kokoro/lexicon-zh.txt"
length_scale = 1.0
# voice = "zf_xiaoyi"   # Kokoro 音色名（kokoro-multi-lang-v1_0，共 53 个）；设置后覆盖 sid
sid = 0
speed = 1.0

[tts.sherpa.zipvoice]
encoder = "models/zipvoice/encoder.int8.onnx"
decoder = "models/zipvoice/decoder.int8.onnx"
vocoder = "models/zipvoice/vocos_24khz.onnx"
tokens = "models/zipvoice/tokens.txt"
data_dir = "models/zipvoice/espeak-ng-data"
lexicon = "models/zipvoice/lexicon.txt"
reference_audio = "models/zipvoice/test_wavs/leijun-1.wav"
reference_text = "那还是三十六年前, 一九八七年. 我呢考上了武汉大学的计算机系."
num_steps = 4
speed = 1.0

# ============================================================
# 云端 DashScope（backend = bailian/cloud/dashscope 时必填）
# 也可设置环境变量 DASHSCOPE_API_KEY
# ============================================================
[dashscope]
api_key = "sk-your-dashscope-key"
ws_url = "wss://dashscope.aliyuncs.com/api-ws/v1/inference"

# ============================================================
# 大语言模型 (LLM)
# ============================================================
[llm]
base_url = "http://127.0.0.1:11080/v1"
api_key = "sk-your-key"
model = "your-model"
system_prompt = """你叫小白，是一个温暖的智能语音助手，声音带一点呆萌，像用户身边随时待命的朋友。

【核心性格】
- 全程只用口语化的中文交流，语气亲切、活泼，偶尔可以开个小玩笑，但始终礼貌。
- 用户叫你时，你可以用"在呢""来啦""怎么啦"等方式开心回应。
- 你是真实、可信的伙伴，不会假装拥有不存在的功能，不知道的事会诚实说"小白还得再学学"。

【输出格式铁律】
- 你的所有回答必须是纯口语，直接说出来就能让人听懂，没有阅读感。
- 只允许使用逗号，句号，问号，感叹号这四种标点符号。除此之外，绝对不许出现任何其他符号。
- 禁止使用以下内容：emoji、表情符号、Markdown 格式、列表符号、代码块、引号、括号、书名号、省略号、破折号、波浪线等。
- 不要刻意在句子里加入语气词符号，如"嗯…"，要说"嗯，"用逗号代替。

再次强调：你的每一次回复都必须严格遵守上述输出格式，只能是最干净的口语，只能使用逗号句号问号感叹号。"""
max_tokens = 80
temperature = 0.7
warmup_on_start = true
user_id = "flowy"
tools_enabled = true
thinking_enabled = true
thinking_budget = 512
reasoning_effort = "low"
execute_allowlist = ["date", "uptime", "powershell", "cmd", "ipconfig", "systeminfo"]

[llm.aipc_talk]
transport = "channel"
session_key = "talk-hermes"
url = "ws://127.0.0.1:9100"
# timeout_secs = 120
# model = "auto"
# provider = "openai"
# 远程 bridge 示例:
# transport = "ws"
# url = "ws://127.0.0.1:9100"

# ============================================================
# 唤醒词（KWS，需 models/kws-zh-en/）
# ============================================================
[wake]
enabled = true
phrases = ["小白小白"]
ack_reply = "哎，我在！"
grace_after_wake_sec = 5
idle_after_turn_sec = 30
sleep_phrases = ["休眠", "安静", "mute", "闭嘴", "别说了", "停止", "silence", "shut up"]
model_dir = "models/kws-zh-en"
tokens_type = "phone+ppinyin"
lexicon = "models/kws-zh-en/en.phone"
boost_score = 2.0
trigger_threshold = 0.35
num_threads = 2
provider = "cpu"

# ============================================================
# 会话编排
# ============================================================
[orchestrator]
min_silence_ms = 450
endpoint_silence_ms = 800
trigger_on_asr_final = true
cold_start_sec = 1
min_final_chars = 2
grace_min_final_chars = 2
sentence_min_len = 12
tts_first_chunk_chars = 6
barge_in_frames = 2
barge_in_enabled = true
speculative_llm = true
speculative_stable_ms = 450
min_rms_trigger = 0.0
min_rms_barge_in = 0.0
barge_in_sustain_frames = 4
barge_in_cooldown_ms = 1000
barge_in_requires_wake = true
max_context_messages = 20
offline_continuation_ms = 800
vad_mode = 3

# ============================================================
# 音频设备（留空 = 系统默认）
# ============================================================
[audio]
input_device = ""
output_device = ""

# ============================================================
# VAD 语音活动检测（Silero，需 models/vad/silero_vad.onnx）
# ============================================================
[vad]
model_path = "models/vad/silero_vad.onnx"
threshold = 0.5
min_silence_duration = 0.55
min_speech_duration = 0.25
max_speech_duration = 15.0
provider = "cpu"

# ============================================================
# 音频降噪（DPDFNet，需 models/denoise/dpdfnet_baseline.onnx）
# ============================================================
[denoise]
enabled = true
variant = "dpdfnet_baseline"
model_dir = "models/denoise"
provider = "cpu"

# ============================================================
# 回声消除（Speex AEC）
# ============================================================
[aec]
enabled = true
frame_size = 256
filter_length = 2048
enable_preprocess = true
delay_ms = 0

# ============================================================
# 声纹验证（需先 `hermes talk enroll`）
# ============================================================
[speaker]
enabled = false
threshold = 0.6
model_dir = "models/speaker"
voiceprint_path = "voiceprint.bin"
provider = "cpu"
